<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MedCare</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
</head>
<body>
    <header>
        <div class="logo admin">Admin Panel</div>
        <nav>
            <a href="admin-dashboard.html" class="active">Overview</a>
            <a href="#" id="logout-btn">Logout</a>
        </nav>
    </header>

    <main>
        <div class="grid-container" style="margin-bottom: 2rem;">
            <div class="glass-card interactive-card">
                <h3>Total Appointments</h3>
                <p id="total-appointments" style="font-size: 2rem; font-weight: 700;">Loading...</p>
            </div>
            <div class="glass-card interactive-card">
                <h3>Pending Approvals</h3>
                <p id="pending-appointments" style="font-size: 2rem; font-weight: 700;">Loading...</p>
            </div>
            <div class="glass-card interactive-card">
                <h3>Registered Doctors</h3>
                <p id="total-doctors" style="font-size: 2rem; font-weight: 700;">Loading...</p>
            </div>
        </div>

        <div class="glass-card" style="margin-bottom: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3>Manage Doctors</h3>
                <button class="btn btn-primary" onclick="document.getElementById('add-doctor-modal').style.display='flex'">+ Add Doctor</button>
            </div>
            <table id="admin-doctors-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Specialization</th>
                        <th>Fee</th>
                        <th>Availability</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-doctors-list">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>

        <div class="glass-card">
            <h3 style="margin-bottom: 1rem;">All Appointments</h3>
            <table id="admin-appointments-table">
                <thead>
                    <tr>
                        <th>Patient</th>
                        <th>Mobile</th>
                        <th>Doctor</th>
                        <th>Date & Time</th>
                        <th>Payment</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-appointments-list">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </main>
    <div id="add-doctor-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;">
        <div class="glass-card" style="width: 100%; max-width: 500px; padding: 2rem;">
            <h2 style="margin-bottom: 1.5rem; text-align: center;">Add New Doctor</h2>
            <form id="add-doctor-form">
                <div class="form-group">
                    <label>Doctor Name</label>
                    <input type="text" id="doc-name" required placeholder="e.g. John Doe">
                </div>
                <div class="form-group">
                    <label>Specialization</label>
                    <select id="doc-spec" required>
                        <option value="Cardiologist">Cardiologist</option>
                        <option value="Dermatologist">Dermatologist</option>
                        <option value="Pediatrician">Pediatrician</option>
                        <option value="Neurologist">Neurologist</option>
                        <option value="Orthopedic">Orthopedic</option>
                        <option value="General Physician">General Physician</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Consultation Fee (₹)</label>
                    <input type="number" id="doc-fee" required min="0" placeholder="e.g. 500">
                </div>
                <div class="form-group">
                    <label>Availability (e.g. Mon-Fri 10am-5pm)</label>
                    <input type="text" id="doc-availability" required placeholder="e.g. Mon-Fri 10am-5pm">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Add Doctor</button>
                <button type="button" class="btn" style="width: 100%; margin-top: 0.5rem; background: transparent; border: 1px solid var(--text);" onclick="document.getElementById('add-doctor-modal').style.display='none'">Cancel</button>
            </form>
        </div>
    </div>
</body>
</html>
