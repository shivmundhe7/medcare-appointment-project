<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MedCare</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="script.js"></script>
</head>
<body>
    <header>
        <div class="logo">MedCare+</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="dashboard.html" class="active">Appointments</a>
            <a href="#" id="logout-btn">Logout</a>
        </nav>
    </header>

    <main>
        <h2 style="margin-bottom: 2rem;">My Appointments</h2>
        <div class="glass-card" style="margin-bottom: 2rem;">
            <h3 style="margin-bottom: 1rem;">Book New Appointment</h3>
            <form id="booking-form" class="grid-container" style="gap: 1rem; align-items: end;">
                <div class="form-group">
                    <label>Select Specialist</label>
                    <select id="doctor-select" required>
                        <option value="">Choose a Doctor...</option>
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Preferred Date</label>
                    <input type="date" id="date" required min="">
                </div>
                <div class="form-group">
                    <label>Preferred Time</label>
                    <select id="time" required>
                        <option value="">Select Time...</option>
                        <option value="09:00">09:00 AM</option>
                        <option value="10:00">10:00 AM</option>
                        <option value="11:00">11:00 AM</option>
                        <option value="14:00">02:00 PM</option>
                        <option value="15:00">03:00 PM</option>
                        <option value="16:00">04:00 PM</option>
                    </select>
                </div>
                <div class="form-group" style="display: flex; flex-direction: column; justify-content: flex-end;">
                     <label>Total Fee</label>
                     <div id="price-display" style="font-size: 1.5rem; font-weight: bold; color: var(--primary);">₹0</div>
                </div>
                <button type="submit" class="btn btn-primary" style="height: 48px;">Book & Pay</button>
            </form>
        </div>

        <div class="glass-card">
            <h3 style="margin-bottom: 1rem;">Upcoming Visits</h3>
            <table id="appointments-table">
                <thead>
                    <tr>
                        <th>Doctor</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="appointments-list">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
